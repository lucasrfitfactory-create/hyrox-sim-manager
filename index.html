/* =========================================================================
   TV / SIGNAGE START LIST (?view=startlist) — public, no-login, read-only
   ========================================================================= */
const TV_LOGO_URL = "https://cdn.prod.website-files.com/695d5fde2fc058d6e19d5fff/695d6462b0d560da6de1bfd4_logo.png";
const TV_YELLOW = "#FFD400"; // HYROX brand yellow, used as this display's secondary accent
function tvCountdownText(ev){
  // Note: kept as a separate function (rather than inline) since renderStartListTV()
  // calls it once per render and the 30s refresh interval keeps the countdown fresh
  // without needing a per-second clock tick.
  const diff = daysUntil(ev);
  const abs = Math.abs(diff);
  const d = Math.floor(abs/86400000), h = Math.floor((abs%86400000)/3600000), m = Math.floor((abs%3600000)/60000);
  if(diff>0) return `${d}d ${h}h ${m}m until race day`;
  if(diff > -3*3600000) return "Race day is here";
  return `Race started ${d}d ${h}h ago`;
}
function renderStartListTV(){
  const ev = curEvent();
  const now = new Date();
  // Only treat heats as "live"/"done" on the actual event date — comparing
  // time-of-day alone (the old bug) marked morning heats red every single
  // day at the matching hour, weeks before the event actually happens.
  const localDateStr = now.getFullYear()+"-"+String(now.getMonth()+1).padStart(2,"0")+"-"+String(now.getDate()).padStart(2,"0");
  const isEventDay = localDateStr === ev.date;
  const nowMin = now.getHours()*60 + now.getMinutes();
  const heats = ev.heats.slice().sort((a,b)=> timeToMin(a.time)-timeToMin(b.time));

  const nameParts = ev.name.split("—").map(s=>s.trim()).filter(Boolean);
  const eventTitle = nameParts.join(" · ");
  const countdownText = tvCountdownText(ev);

  const cardStyle = {
    upcoming: `border:2px solid var(--border);background:var(--bg3);`,
    live: `border:2px solid var(--red);background:rgba(248,81,73,0.18);`,
    done: `border:2px solid var(--border);background:var(--bg2);opacity:0.4;`
  };
  const dot = { upcoming:"", live:"🔴", done:"✅" };

  function cardsHtml(fontScale){
    return heats.map(h=>{
      const startMin = timeToMin(h.time), endMin = startMin + ev.raceDuration;
      const status = !isEventDay ? "upcoming" : (nowMin>=endMin ? "done" : nowMin>=startMin ? "live" : "upcoming");
      const teamLines = h.participantIds.map(id=>ev.participants.find(p=>p.id===id)).filter(Boolean).map(p=>teamLabel(p));
      const namesHtml = teamLines.length ? teamLines.map(t=>`<div>${esc(t)}</div>`).join("") : "Open slot";
      return `<div style="${cardStyle[status]}border-radius:10px;padding:${10*fontScale}px ${12*fontScale}px;">
        <div style="display:flex;align-items:center;justify-content:space-between;gap:6px;">
          <div style="font-weight:800;font-size:${1.3*fontScale}em;color:${TV_YELLOW};">${fmt12(h.time)}</div>
          <div style="font-size:${1.1*fontScale}em;">${dot[status]}</div>
        </div>
        <div style="font-size:${1*fontScale}em;margin-top:2px;color:var(--muted);">${esc(h.division)}</div>
        <div style="font-size:${1.05*fontScale}em;font-weight:600;margin-top:4px;line-height:1.35;">${namesHtml}</div>
      </div>`;
    }).join("");
  }

  function render(fontScale, cardMinW){
    document.body.innerHTML = `
      <div style="min-height:100vh;background:var(--bg);color:var(--text);box-sizing:border-box;padding:24px 36px;font-family:inherit;display:flex;flex-direction:column;">
        <div style="display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:16px;margin-bottom:18px;">
          <div style="text-align:left;">
            <div style="font-size:1.5em;font-weight:800;">${esc(eventTitle)}</div>
          </div>
          <img src="${TV_LOGO_URL}" alt="Fit Factory" style="height:48px;width:auto;">
          <div style="text-align:right;">
            <div style="font-size:1.3em;font-weight:800;color:${TV_YELLOW};">${esc(countdownText)}</div>
          </div>
        </div>
        <div id="tvGrid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(${cardMinW}px,1fr));gap:${10*fontScale}px;align-content:start;">
          ${cardsHtml(fontScale) || `<div style="color:var(--muted);padding:20px;">Schedule not published yet, check back soon.</div>`}
        </div>
      </div>
    `;
  }

  // Start generous and let the loop below settle to whatever actually fills
  // the screen — growing cards up when there's spare room, shrinking them
  // down when they overflow, instead of only ever shrinking from a fixed
  // tier (which left a lot of dead space on screens with few heats).
  const total = heats.length;
  let fontScale = 1.3, cardMinW = 300;

  render(fontScale, cardMinW);

  if(total>0){
    for(let i=0;i<6;i++){
      const contentH = document.body.scrollHeight;
      const availH = window.innerHeight;
      if(Math.abs(contentH-availH) <= 6) break;
      let ratio = availH / contentH;
      ratio = 1 + (ratio-1)*0.85; // damp so it converges instead of oscillating
      fontScale = Math.min(3, Math.max(0.4, fontScale * ratio));
      cardMinW = Math.min(440, Math.max(120, Math.round(cardMinW * Math.sqrt(ratio))));
      render(fontScale, cardMinW);
    }
  }
}

function logout(){
  DB.role=null; DB.currentVolunteerId=null; DB.currentParticipantId=null; saveDB();
  if(CLOUD_ENABLED && firebase.auth().currentUser){ firebase.auth().signOut(); }
  showLogin();
}
/* Cloud data (participants, divisions, etc.) arrives asynchronously after
   page load. If the visitor is still sitting on the login/name-picker screen
   when it arrives, the picker was built from stale/empty local data and
   needs to be refreshed in place — otherwise names picked before the real
   data lands fail with "we couldn't find your registration" until they hit
   Switch User and reload the screen. This re-populates the picker's lists
   without resetting anything the visitor has already typed. */
function refreshLoginScreenIfVisible(){
  if(DB.role) return; // already logged in — nothing to refresh
  if(document.getElementById("loginScreen").style.display === "none") return;
  const vs = document.getElementById("volunteerSelect");
  if(vs) vs.innerHTML = Object.values(curEvent().volunteers).map(v=>`<option value="${v.id}">${esc(v.name)}</option>`).join("");
  renderParticipantResults();
}
function showLogin(){
  document.getElementById("appShell").style.display = "none";
  document.getElementById("loginScreen").style.display = "flex";
  document.getElementById("adminPasswordPrompt").classList.add("hidden");
  document.getElementById("volunteerPicker").classList.add("hidden");
  document.getElementById("participantPicker").classList.add("hidden");
  document.getElementById("adminPasswordError").style.display = "none";
  document.getElementById("adminEmailInput").value = "";
  document.getElementById("adminPasswordInput").value = "";
  ["btnAdminLogin","btnVolunteerLogin","btnParticipantLogin"].forEach(bid=> document.getElementById(bid).classList.remove("primary"));
  const vs = document.getElementById("volunteerSelect");
  vs.innerHTML = Object.values(curEvent().volunteers).map(v=>`<option value="${v.id}">${esc(v.name)}</option>`).join("");
  const divFilter = document.getElementById("participantDivisionFilter");
  divFilter.innerHTML = `<option value="">All Divisions</option>` + DIVISIONS.map(d=>`<option>${esc(d)}</option>`).join("");
  document.getElementById("participantSearchInput").value = "";
  renderParticipantResults();
  if(DIRECT_ATHLETE_MODE){
    document.getElementById("roleBtns").style.display = "none";
    document.getElementById("loginCard").classList.add("athlete-mode");
    // Event names are typically "HYROX Simulation — August 9" — split so the
    // date gets its own compact badge instead of wrapping awkwardly in the h1.
    const nameParts = curEvent().name.split("—").map(s=>s.trim());
    document.getElementById("loginTitle").textContent = "🏁 " + (nameParts[0] || curEvent().name);
    const badge = document.getElementById("loginEventBadge");
    if(nameParts[1]){ badge.textContent = nameParts[1]; badge.classList.remove("hidden"); }
    else { badge.classList.add("hidden"); }
    document.getElementById("loginSubtitle").textContent = "Find your heat time";
    document.getElementById("participantPicker").classList.remove("hidden");
  }
}
function renderParticipantResults(){
  const ev = curEvent();
  const q = (document.getElementById("participantSearchInput").value||"").trim().toLowerCase();
  const div = document.getElementById("participantDivisionFilter").value;
  let list = ev.participants.slice();
  if(div) list = list.filter(p=>p.division===div);
  if(q) list = list.filter(p=> fullName(p).toLowerCase().includes(q) || (p.partnerNames||"").toLowerCase().includes(q));
  list.sort((a,b)=> fullName(a).localeCompare(fullName(b)));
  const container = document.getElementById("participantResultsList");
  if(!list.length){
    container.innerHTML = `<div style="color:var(--muted);font-size:13px;padding:10px;text-align:center;">No matches — check the spelling or try clearing the division filter.</div>`;
    return;
  }
  const capped = list.slice(0, 60);
  container.innerHTML = capped.map(p=>`<button type="button" class="participant-pick-btn" data-pid="${p.id}">${esc(teamLabel(p))} <span style="color:var(--muted);font-size:12px;">— ${esc(p.division)}</span></button>`).join("")
    + (list.length>capped.length ? `<div style="color:var(--muted);font-size:12px;text-align:center;padding:6px;">+${list.length-capped.length} more — keep typing to narrow it down</div>` : "");
  container.querySelectorAll("[data-pid]").forEach(btn=>{
    btn.addEventListener("click", ()=>{
      DB.role="participant"; DB.currentParticipantId = btn.dataset.pid; saveDB(true); enterApp();
    });
  });
}

  document.getElementById("loginScreen").style.display = "none";
  document.getElementById("appShell").style.display = "flex";

  renderAll();
}
function tryAdminLogin(){
  const email = document.getElementById("adminEmailInput").value.trim();
  const pass = document.getElementById("adminPasswordInput").value;
  const btn = document.getElementById("btnAdminContinue");
  const showError = (msg)=>{
    const el = document.getElementById("adminPasswordError");
    el.textContent = msg || "Incorrect email or password. Try again.";
    el.style.display = "block";
    document.getElementById("adminPasswordInput").value = "";
    document.getElementById("adminPasswordInput").focus();

  if(!CLOUD_ENABLED){
    // No Firebase project configured yet — local-only fallback, no real auth possible.
    showError("Cloud sync isn't configured yet, so admin login is unavailable. Ask Lucas to finish Firebase setup.");

  if(!email || !pass){ showError("Enter both email and password."); return; }
  document.getElementById("adminPasswordError").style.display = "none";
  btn.disabled = true; btn.textContent = "Signing in…";
  firebase.auth().signInWithEmailAndPassword(email, pass)

    .catch((err)=>{ console.error("Admin sign-in failed", err); showError(); })
    .finally(()=>{ btn.disabled = false; btn.textContent = "Continue"; });

  // Public TV/signage display — no login screen, no admin/volunteer state.
  renderStartListTV();
  setInterval(renderStartListTV, 30000);   // periodic refresh of countdown + live/done status
} else if(DB.role==="admin" && CLOUD_ENABLED){
  // Don't trust a stale localStorage role — confirm there's a live Firebase
  // session before granting admin UI. This is a UX check only; the real
  // enforcement is the Firestore security rule requiring request.auth.
  showLogin();
  firebase.auth().onAuthStateChanged(user=>{
    if(user){ DB.adminTier = computeAdminTier(user.email); enterApp(); } else { DB.role=null; saveDB(); showLogin(); }
  });
} else if(DB.role){
  enterApp();
} else {
  showLogin();
}
initCloudSync();
</script>
</body>
</html>
